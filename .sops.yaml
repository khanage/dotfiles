      - age:
          - *admin_khan
          - *host_homepc
          - *host_work
          - *host_thebrain
          - *host_pinky

  # Per-host secrets.
  - path_regex: secrets/homepc/[^/]+\.yaml$
    key_groups:
      - age:
          - *admin_khan
          - *host_homepc
          - *host_thebrain
          - *host_pinky

  - path_regex: secrets/work/[^/]+\.yaml$
    key_groups:
      - age:
          - *admin_khan
          - *host_work
